<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<link rel="icon" type="image/png" href="favicon.png">
<link rel="apple-touch-icon" href="favicon.png">
<title>Sinem &amp; Ahmet · 20.08.2026</title>
<meta name="description" content="Düğünümüze davetlisiniz — katılımınızı bu sayfadan bildirebilirsiniz.">
<!-- WhatsApp / sosyal medya önizleme kartı. -->
<meta property="og:type" content="website">
<meta property="og:title" content="Sinem & Ahmet · 20.08.2026">
<meta property="og:description" content="Düğünümüze davetlisiniz. Katılımınızı bu sayfadan bildirebilirsiniz.">
<meta property="og:image" content="https://sinemveahmet.love/og.jpg">
<meta property="og:url" content="https://sinemveahmet.love/">
<meta name="twitter:card" content="summary_large_image">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Ms+Madi&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css?v=2">
</head>
<body>
<div class="grain" aria-hidden="true"></div>

<div class="art">
  <img src="og.jpg" alt="">
  <svg class="art-edge" viewBox="0 0 1200 44" preserveAspectRatio="none" aria-hidden="true">
    <path d="M0,44 L0,26 Q60,12 130,22 T290,18 Q360,8 430,20 T590,14 Q660,24 730,15 T880,21 Q950,9 1030,19 T1200,16 L1200,44 Z" fill="#f6f5f1"/>
  </svg>
</div>
<header>
  <nav class="lang" aria-label="Dil / Taal">
    <button id="langTR" class="on" onclick="setLang('tr')">TR</button>
    <button id="langNL" onclick="setLang('nl')">NL</button>
  </nav>
</header>

<main>
  <!-- hero -->
  <section class="hero">
        <p class="eyebrow">Wedding of</p>
    <h1 class="names">Sinem &amp; Ahmet</h1>
    <p class="datetime"><span id="evDate">20.08.2026</span><span class="dot">·</span><span id="evTime">16.00</span></p>
    <p class="countdown" id="countdown"></p>

    <svg class="divider" viewBox="0 0 220 26" fill="none" stroke="currentColor"
         stroke-width="1.4" stroke-linecap="round" aria-hidden="true">
      <path d="M8 14 Q60 10 110 13 Q160 16 212 12"/>
      <path d="M46 13 Q42 6 35 4  M46 13 Q40 8 33 8" stroke-width="1.1"/>
      <path d="M80 12 Q84 19 92 21 M80 12 Q86 17 94 17" stroke-width="1.1"/>
      <path d="M132 14 Q128 7 121 5 M132 14 Q126 9 119 9" stroke-width="1.1"/>
      <path d="M168 13 Q172 20 180 22 M168 13 Q174 18 182 18" stroke-width="1.1"/>
      <circle cx="110" cy="13" r="2" fill="currentColor" stroke="none"/>
    </svg>

    <p class="deadline" data-i18n="deadline"></p>
  </section>

  <!-- details -->
  <section class="details">
    <div class="detail-addr">
      <p class="d-label" data-i18n="d_addr"></p>
      <p class="d-value">Evenementen &amp; Partycentrum Royal
        <small>Schaluinen 11A, 5111 HB Baarle-Nassau</small>
      </p>
      <div class="btn-row">
        <button type="button" class="maps-btn" onclick="openChooser('maps')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M12 21s-7-5.5-7-11a7 7 0 0 1 14 0c0 5.5-7 11-7 11z"/>
            <circle cx="12" cy="10" r="2.6"/>
          </svg>
          <span data-i18n="d_maps"></span>
        </button>
        <button type="button" class="maps-btn" onclick="openChooser('cal')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <rect x="3" y="5" width="18" height="16" rx="2"/>
            <path d="M16 3v4M8 3v4M3 11h18M12 15v4M10 17h4"/>
          </svg>
          <span data-i18n="d_cal"></span>
        </button>
      </div>
    </div>
  </section>

  <!-- rsvp -->
  <section class="rsvp" id="rsvp">
    <h2 data-i18n="r_title"></h2>
    <div class="card">
      <div class="field">
        <label for="mainName"><span data-i18n="f_name"></span> <span class="req">*</span></label>
        <input type="text" id="mainName" autocomplete="name" data-i18n-ph="f_name_ph">
      </div>

      <div class="field">
        <p class="f-label"><span data-i18n="f_attend"></span> <span class="req">*</span></p>
        <div class="seg" role="group">
          <button type="button" id="attYes" data-i18n="yes" onclick="setAttend('yes')"></button>
          <button type="button" id="attNo" data-i18n="no" onclick="setAttend('no')"></button>
        </div>
      </div>

      <div id="attendExtra" class="hidden">
        <div class="field">
          <p class="f-label" data-i18n="f_guests"></p>
          <button type="button" class="guest-btn" onclick="openGuests()">
            <span data-i18n="f_guests_btn"></span>
            <span class="guest-count" id="guestCount">–</span>
          </button>
        </div>

        <div class="field">
          <p class="f-label" data-i18n="f_baby"></p>
          <div class="stepper">
            <button type="button" onclick="stepBaby(-1)" aria-label="−">−</button>
            <span class="num" id="babyNum">0</span>
            <button type="button" onclick="stepBaby(1)" aria-label="+">+</button>
          </div>
          <span class="hint" data-i18n="f_baby_hint"></span>
        </div>

        <div class="field">
          <p class="f-label"><span data-i18n="f_transport"></span> <span class="req">*</span></p>
          <div class="seg" role="group">
            <button type="button" id="trYes" data-i18n="yes" onclick="setTransport('yes')"></button>
            <button type="button" id="trNo" data-i18n="no" onclick="setTransport('no')"></button>
          </div>
        </div>
      </div>

      <div class="field">
        <label for="message" data-i18n="f_msg"></label>
        <textarea id="message" rows="3" data-i18n-ph="f_msg_ph"></textarea>
      </div>

      <!-- honeypot -->
      <div class="hp" aria-hidden="true">
        <label>Website</label>
        <input type="text" id="website" tabindex="-1" autocomplete="off">
      </div>

      <p class="form-error" id="formError"></p>
      <button type="button" class="primary" onclick="openPreview()" data-i18n="f_preview"></button>
    </div>
  </section>
</main>

<footer>
  <svg class="divider" viewBox="0 0 220 26" fill="none" stroke="currentColor"
       stroke-width="1.4" stroke-linecap="round" aria-hidden="true" style="color:var(--line)">
    <path d="M8 14 Q60 10 110 13 Q160 16 212 12"/>
    <path d="M80 12 Q84 19 92 21 M80 12 Q86 17 94 17" stroke-width="1.1"/>
    <path d="M132 14 Q128 7 121 5 M132 14 Q126 9 119 9" stroke-width="1.1"/>
    <circle cx="110" cy="13" r="2" fill="currentColor" stroke="none"/>
  </svg>
  <p class="names-sm">Sinem &amp; Ahmet</p>
  <p class="f-date">20.08.2026</p>
</footer>

<!-- chooser(harita / takvim) -->
<div class="overlay hidden" id="chooserModal" role="dialog" aria-modal="true">
  <div class="panel chooser-panel">
    <button class="x" onclick="closeChooser()" aria-label="Kapat">×</button>
    <h3 id="chooserTitle"></h3>
    <div id="chooserList"></div>
  </div>
</div>

<!-- guest modal -->
<div class="overlay hidden" id="guestModal" role="dialog" aria-modal="true">
  <div class="panel">
    <button class="x" onclick="closeGuests()" aria-label="Kapat">×</button>
    <h3 data-i18n="g_title"></h3>
    <p class="hint g-note" data-i18n="g_note"></p>
    <div id="guestRows"></div>
    <button type="button" class="g-add" onclick="addRow()" data-i18n="g_add"></button>
    <p class="form-error" id="guestError"></p>
    <div class="actions">
      <button type="button" class="ghost" onclick="closeGuests()" data-i18n="g_cancel"></button>
      <button type="button" class="primary" onclick="saveGuests()" data-i18n="g_save"></button>
    </div>
  </div>
</div>

<!-- preview -->
<div class="overlay hidden" id="previewModal" role="dialog" aria-modal="true">
  <div class="panel">
    <h3 data-i18n="p_title"></h3>
    <div class="sum" id="summary"></div>
    <p class="form-error" id="sendError"></p>
    <div class="actions">
      <button type="button" class="ghost" onclick="closePreview()" data-i18n="p_edit"></button>
      <button type="button" class="primary" id="sendBtn" onclick="submitForm()" data-i18n="p_send"></button>
    </div>
  </div>
</div>

<!-- thank you -->
<div class="overlay hidden" id="thanksModal" role="dialog" aria-modal="true">
  <div class="panel thanks-panel">
    <svg class="gazebo" viewBox="0 0 120 120" fill="none" stroke="var(--line)"
         stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <circle cx="60" cy="14" r="2.6"/><path d="M60 17 L60 24"/>
      <path d="M23 52 Q28 30 60 25 Q92 30 97 52"/>
      <path d="M20 52 L100 52"/><path d="M23 57 L97 57" stroke-width="1.1"/>
      <path d="M30 57 L30 96"/><path d="M50 57 L50 96"/>
      <path d="M70 57 L70 96"/><path d="M90 57 L90 96"/>
      <path d="M24 97 L96 97"/><path d="M18 103 L102 103"/>
    </svg>
    <h3 id="thanksTitle"></h3>
    <p id="thanksText"></p>
    <p class="names-sm">Sinem &amp; Ahmet</p>
  </div>
</div>

<script src="app.js?v=2"></script>
</body>
</html>
